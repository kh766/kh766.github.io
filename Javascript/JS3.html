<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="minDiv">
        Det här texten blir röd om du har trycker på knappen.
    </div>

    <button id="colorButton">röd</button>
 




   <script>
        // nedan finner du en hit kod som kommer att leda till att man kan klicka på knappen.

        let button = document.getElementById("colorButton");
        let div = document.getElementById("minDiv");

        button.addEventListener("click", function() {
            div.style.color = "red";
        });    
  
    
        
        
    </script>
</body>
</html>
