<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Formulär</title>
</head>
<body>

<h2>Registrering</h2>

<form id="mittFormular">
    <label>Namn:</label><br>
    <input type="text" required><br><br>

    <label>E-post:</label><br>
    <input type="email" required><br><br>

    <label>Ålder:</label><br>
    <input type="number" required><br><br>

    <button type="submit">Skicka</button>
</form>

<p id="meddelande"></p>

<script>
    let form = document.getElementById("mittFormular");
    let meddelande = document.getElementById("meddelande");

    form.addEventListener("submit", function(event) {
        event.preventDefault();
        meddelande.innerHTML = "Tack!";
    });
</script>

</body>
</html>
